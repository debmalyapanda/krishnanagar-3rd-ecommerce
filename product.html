<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | AURA Atelier</title>
  <meta name="description" content="Detailed specifications, handcrafted materials, and client reviews for AURA Atelier luxury interior design items.">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/glassmorphism.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    #pd-img-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-md);
      cursor: crosshair;
      background: #12141D;
    }
    #pd-main-img {
      transition: transform 0.2s ease-out;
      width: 100%;
      height: 480px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- Shared Header -->
  <header id="site-header"></header>

  <!-- Breadcrumbs -->
  <section style="background: #0E1017; padding: 1.5rem 0; border-bottom: 1px solid var(--border-dark);">
    <div class="container">
      <div style="display: flex; gap: 0.75rem; color: var(--text-light-muted); font-size: 0.85rem;">
        <a href="index.html" style="color: var(--text-light-muted);">Home</a>
        <span>/</span>
        <a href="shop.html" style="color: var(--text-light-muted);">Shop</a>
        <span>/</span>
        <span id="pd-bc-cat" style="color: var(--text-light-muted);">Category</span>
        <span>/</span>
        <span id="pd-bc-title" style="color: var(--gold-primary);">Product Name</span>
      </div>
    </div>
  </section>

  <!-- Product Main Detail View -->
  <section style="padding: 4rem 0 6rem 0;">
    <div class="container">
      <div class="grid grid-cols-2 product-detail-grid" style="gap: 3.5rem; align-items: start;">
        
        <!-- Gallery Side -->
        <div>
          <div id="pd-img-container">
            <img id="pd-main-img" src="" alt="Product Showcase">
          </div>
          <div id="pd-thumbs-container" style="display: flex; gap: 1rem; margin-top: 1.25rem;">
            <!-- Thumbnails rendered dynamically -->
          </div>
        </div>

        <!-- Details & Actions Side -->
        <div>
          <span id="pd-category" style="color: var(--gold-primary); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;">CATEGORY</span>
          <h1 id="pd-title" style="font-size: 2.2rem; color: #FFF; font-family: var(--font-heading); margin: 0.5rem 0 1rem 0; line-height: 1.2;">PRODUCT TITLE</h1>
          
          <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <span id="pd-price" style="font-size: 2rem; font-weight: 800; color: var(--gold-primary);">$0</span>
              <span id="pd-original-price" style="font-size: 1.1rem; color: var(--text-light-muted); text-decoration: line-through;">$0</span>
            </div>
            <span id="pd-discount" class="badge-tag badge-discount" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">-0% OFF</span>
            <span style="background: rgba(34,197,94,0.15); color: #4ADE80; font-size: 0.75rem; font-weight: 700; padding: 0.35rem 0.75rem; border-radius: 4px; border: 1px solid rgba(34,197,94,0.3);"><i class="fas fa-check-circle"></i> In Atelier Stock</span>
          </div>

          <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div id="pd-rating" class="stars" style="font-size: 1rem;"></div>
            <span id="pd-review-count" style="color: var(--text-light-muted); font-size: 0.85rem;"></span>
          </div>

          <p id="pd-description" style="color: var(--text-light-secondary); font-size: 1rem; line-height: 1.7; margin-bottom: 2rem;"></p>

          <!-- Color Swatch Selector -->
          <div style="margin-bottom: 2rem;">
            <label style="display: block; color: var(--gold-primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.75rem;">FINISH & MATERIAL</label>
            <div style="display: flex; gap: 0.75rem;">
              <button class="btn btn-gold" style="padding: 0.5rem 1rem; font-size: 0.75rem;">Classic Atelier Finish</button>
              <button class="btn btn-glass" style="padding: 0.5rem 1rem; font-size: 0.75rem;">Polished Titanium Brass</button>
            </div>
          </div>

          <!-- Quantity Picker & Add to Cart -->
          <div class="pd-actions-row" style="display: flex; gap: 1.25rem; align-items: center; margin-bottom: 2rem;">
            <div style="display: flex; align-items: center; border: 1px solid var(--border-gold); border-radius: var(--radius-sm); overflow: hidden; background: rgba(255,255,255,0.05);">
              <button id="pd-qty-minus" style="padding: 0.9rem 1.2rem; color: #FFF; font-size: 1.1rem;">-</button>
              <input id="pd-qty-input" type="number" value="1" min="1" style="width: 50px; text-align: center; color: #FFF; font-weight: 700; font-size: 1rem;">
              <button id="pd-qty-plus" style="padding: 0.9rem 1.2rem; color: #FFF; font-size: 1.1rem;">+</button>
            </div>
            
            <button id="pd-add-cart-btn" class="btn btn-gold" style="flex: 1; padding: 1rem;">
              <i class="fas fa-shopping-bag"></i> Add To Cart
            </button>
          </div>

          <div style="display: flex; gap: 1rem; margin-bottom: 2.5rem;">
            <button id="pd-buy-now-btn" class="btn btn-outline-gold" style="flex: 1;">Buy Now</button>
            <button id="pd-wishlist-btn" class="btn btn-glass" style="flex: 1;"><i class="far fa-heart"></i> Add to Wishlist</button>
          </div>

          <!-- Value Chips -->
          <div class="grid grid-cols-3 product-values-row" style="gap: 1rem; background: rgba(255,255,255,0.03); padding: 1.25rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <i class="fas fa-truck text-gold" style="font-size: 1.25rem;"></i>
              <span style="font-size: 0.75rem; color: var(--text-light-secondary);">White-Glove Shipping</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <i class="fas fa-shield-halved text-gold" style="font-size: 1.25rem;"></i>
              <span style="font-size: 0.75rem; color: var(--text-light-secondary);">10-Year Warranty</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <i class="fas fa-rotate text-gold" style="font-size: 1.25rem;"></i>
              <span style="font-size: 0.75rem; color: var(--text-light-secondary);">30-Day Atelier Guarantee</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Frequently Bought Together Bundle -->
      <div id="pd-bundle-container"></div>

      <!-- Tabbed Detailed Sections -->
      <div style="margin-top: 5rem;">
        <div class="pd-tabs-row" style="display: flex; gap: 1rem; border-bottom: 1px solid var(--border-gold); padding-bottom: 1rem; margin-bottom: 2.5rem;">
          <button class="btn btn-gold pd-tab-btn" data-tab="specs">Specifications</button>
          <button class="btn btn-glass pd-tab-btn" data-tab="desc">Full Description</button>
          <button class="btn btn-glass pd-tab-btn" data-tab="reviews">Verified Client Reviews</button>
        </div>

        <div id="tab-specs" class="pd-tab-content">
          <div class="glass-panel-dark" style="padding: 2.5rem; max-width: 900px;">
            <h3 style="font-family: var(--font-heading); color: #FFF; font-size: 1.3rem; margin-bottom: 1.5rem;">TECHNICAL SPECIFICATIONS</h3>
            <table style="width: 100%; border-collapse: collapse;">
              <tbody id="pd-specs-table"></tbody>
            </table>
          </div>
        </div>

        <div id="tab-desc" class="pd-tab-content" style="display: none;">
          <div class="glass-panel-dark" style="padding: 2.5rem; max-width: 900px; line-height: 1.8; color: var(--text-light-secondary);">
            <h3 style="font-family: var(--font-heading); color: #FFF; font-size: 1.3rem; margin-bottom: 1.5rem;">ATELIER CRAFTSMANSHIP & STORY</h3>
            <p id="pd-full-description"></p>
          </div>
        </div>

        <div id="tab-reviews" class="pd-tab-content" style="display: none;">
          <div style="max-width: 900px;">
            <div id="pd-reviews-list"></div>
          </div>
        </div>
      </div>

      <!-- Related Products Grid -->
      <div style="margin-top: 6rem;">
        <div class="section-title-wrapper" style="text-align: left; margin-bottom: 2.5rem;">
          <span class="section-subtitle">COMPLEMENTARY HARMONY</span>
          <h2 class="section-title" style="display: block;">YOU MAY ALSO ADMIRE</h2>
        </div>
        <div id="pd-related-grid" class="grid grid-cols-4" style="gap: 2rem;"></div>
      </div>

    </div>
  </section>

  <!-- Shared Footer -->
  <footer id="site-footer"></footer>

  <!-- Scripts -->
  <script type="module" src="js/store.js"></script>
  <script type="module" src="js/products-data.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/product-detail.js"></script>
</body>
</html>
